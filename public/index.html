<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#C00000"/>
<title>Market Day · Long Island Farmers Markets</title>
<link rel="icon" href="logo.png"/>
<link rel="apple-touch-icon" href="logo.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#C00000; --red-deep:#A30000; --red-ink:#7a0000;
  --black:#171310; --ink:#211b15; --ink-soft:#8a7f72;
  --cream:#FBF6EC; --card:#ffffff; --line:#EBE1D1; --oat:#F4EDDE;
  --ok:#2E7D4F; --warn:#B7791F; --bad:#C0392B; --tomato-soft:#fbe3de;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:var(--cream);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
a{color:var(--red-deep)}
.wrap{max-width:500px;margin:0 auto;min-height:100vh;background:var(--cream);position:relative;overflow:hidden}
.frame{min-height:100vh;display:flex;flex-direction:column}
.scroll{flex:1;overflow-y:auto;padding:14px 16px 40px}
button{font-family:inherit}

/* ---------- top bar ---------- */
.topbar{display:flex;align-items:center;gap:11px;padding:12px 16px 11px;background:#fff}
.topbar .brandlogo{height:34px;width:auto;display:block}
.topbar .ttl{display:flex;flex-direction:column;line-height:1}
.topbar .ttl b{font-family:"Anton";font-weight:400;font-size:19px;letter-spacing:.5px;text-transform:uppercase;color:var(--ink)}
.topbar .ttl small{font-family:"Oswald";font-weight:600;font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--red);margin-top:3px}

/* appbar for sub-screens */
.appbar{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border-bottom:3px solid var(--red)}
.appbar .back{width:38px;height:38px;border:none;background:var(--oat);border-radius:11px;display:flex;align-items:center;justify-content:center;color:var(--ink);cursor:pointer}
.appbar .back svg{width:20px;height:20px}
.appbar .title{display:flex;flex-direction:column;line-height:1.15;min-width:0}
.appbar .title b{font-family:"Anton";font-weight:400;font-size:18px;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.appbar .title small{color:var(--ink-soft);font-weight:600;font-size:12.5px;margin-top:2px}

/* ---------- headers ---------- */
.hello{margin:4px 2px 16px}
.eye{font-family:"Oswald";text-transform:uppercase;letter-spacing:.14em;font-weight:600;font-size:12px;color:var(--red)}
.hello h1{font-family:"Anton";font-weight:400;font-size:33px;line-height:1.02;letter-spacing:.5px;text-transform:uppercase;margin:5px 0 0;color:var(--ink)}
.hello h1 span{color:var(--ink-soft)}
.section-title{font-family:"Oswald";text-transform:uppercase;letter-spacing:.09em;font-weight:600;font-size:13px;color:var(--ink);margin:20px 2px 9px}
.section-title span{color:var(--ink-soft);font-weight:600}

/* ---------- cards ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:12px;box-shadow:0 1px 2px rgba(120,80,20,.04)}
.tap{cursor:pointer}
.bigday{padding:0;overflow:hidden;border:none;box-shadow:0 8px 24px rgba(140,20,20,.16)}
.bigday .hd{padding:16px 18px 14px;color:#fff;background:var(--red)}
.bigday .when{font-family:"Oswald";text-transform:uppercase;letter-spacing:.13em;font-weight:600;font-size:11.5px;opacity:.92}
.bigday h2{font-family:"Anton";font-weight:400;font-size:27px;letter-spacing:.5px;text-transform:uppercase;margin:3px 0 2px}
.bigday .sub{font-weight:600;font-size:13.5px;opacity:.95}
.bigday .bd{padding:14px 16px 16px}
.tents{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:11px}
.tent{width:23px;height:20px}
.spotline{display:flex;align-items:baseline;gap:7px;margin-bottom:11px}
.spotline .n{font-family:"Oswald";font-weight:700;font-size:16px;color:var(--ink)}
.spotline .n.full{color:var(--red)}
.spotline .rest{color:var(--ink-soft);font-weight:600;font-size:13px}
.coming{display:flex;flex-direction:column;gap:8px}
.crow{display:flex;align-items:center;gap:9px}
.dot{width:11px;height:11px;border-radius:4px;flex:none}
.crow .nm{flex:1;font-weight:700;font-size:14.5px}
.pill{font-family:"Oswald";font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:3px 9px;border-radius:999px}
.pill.paid{background:#e6f4ea;color:var(--ok)}
.pill.owes{background:#fdead2;color:#9a6512}
.daycard{display:flex;align-items:center;gap:13px;padding:13px 14px}
.daycard .date{width:46px;text-align:center;flex:none}
.daycard .date .d{font-family:"Anton";font-size:23px;line-height:1;color:var(--red)}
.daycard .date .m{font-family:"Oswald";text-transform:uppercase;font-size:11px;letter-spacing:.08em;color:var(--ink-soft);font-weight:600}
.daycard .info{flex:1;min-width:0}
.daycard .info b{font-weight:800;font-size:16px}
.daycard .meta{color:var(--ink-soft);font-weight:600;font-size:13px;margin-top:1px}
.daycard .right{text-align:center;flex:none}
.daycard .spots{font-family:"Anton";font-size:20px;color:var(--ink);line-height:1}
.daycard .spots.full{color:var(--red);font-size:14px;font-family:"Oswald";font-weight:700}
.daycard .right small{color:var(--ink-soft);font-weight:600;font-size:10.5px}
.daycard .chev{color:var(--ink-soft);flex:none}
.chev svg{width:20px;height:20px}

/* ---------- rows / lists ---------- */
.list{display:flex;flex-direction:column;gap:9px}
.row{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 13px}
.row .main{flex:1;min-width:0}
.row .main b{font-weight:800;font-size:15.5px;display:block;line-height:1.15}
.row .meta{color:var(--ink-soft);font-weight:600;font-size:13px;margin-top:2px}
.row .vemail{color:var(--ink);word-break:break-all}
.row .x{width:32px;height:32px;border:none;background:var(--oat);border-radius:9px;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none}
.row .x svg{width:17px;height:17px}
.row .edit{width:34px;height:34px;border:none;background:var(--oat);border-radius:10px;color:var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none}
.row .edit svg{width:18px;height:18px}
button.pill{border:none;cursor:pointer}
.rowflags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.spill{display:inline-block;font-family:"Oswald";font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:2px 8px;border-radius:999px;background:#eee;color:#666;white-space:nowrap}
.spill.ok{background:#e6f4ea;color:var(--ok)}.spill.warn{background:#fbeccd;color:#9a6a12}.spill.bad{background:var(--tomato-soft);color:var(--bad)}
b.ok{color:var(--ok)}b.warn{color:#9a6a12}b.bad{color:var(--bad)}

/* search + inbox banner */
.searchwrap{margin:2px 0 12px}
.search{width:100%;border:1px solid var(--line);background:#fff;border-radius:12px;padding:11px 14px;font:inherit;font-weight:600}
.mchips{display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 0 10px;padding-bottom:2px;scrollbar-width:none}
.mchips::-webkit-scrollbar{display:none}
.mchip{flex:0 0 auto;font-family:"Oswald";font-size:13px;font-weight:600;letter-spacing:.01em;color:var(--ink-soft);background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 13px;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.mchip.on{background:var(--red);border-color:var(--red);color:#fff}
.mchip .mc{font-size:11px;font-weight:700;opacity:.8;background:rgba(0,0,0,.08);border-radius:999px;padding:1px 6px}
.mchip.on .mc{background:rgba(255,255,255,.22);opacity:1}
.search:focus{outline:none;border-color:var(--red)}
.inboxbar{display:flex;align-items:center;gap:10px;width:100%;border:none;background:var(--red);color:#fff;font-weight:800;font-size:14.5px;padding:13px 14px;border-radius:14px;margin:0 0 13px;cursor:pointer;box-shadow:0 6px 16px rgba(140,20,20,.18)}
.inboxbar svg{width:21px;height:21px;flex:none}
.inboxbar span{flex:1;text-align:left}

/* buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;background:var(--red);color:#fff;font-weight:800;font-size:15.5px;padding:14px;border-radius:13px;cursor:pointer;box-shadow:0 4px 12px rgba(140,20,20,.18)}
.btn svg{width:19px;height:19px}
.btn.soft{background:var(--oat);color:var(--ink);box-shadow:none}
.btn.line{background:#fff;color:var(--ink);border:1.5px solid var(--line);box-shadow:none}
.btn.danger{background:#fff;color:var(--bad);border:1.5px solid var(--tomato-soft);box-shadow:none}
.btn-row{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:1.5px solid var(--line);background:#fff;color:var(--ink);font-weight:800;font-size:14.5px;padding:12px;border-radius:12px;cursor:pointer}
.btn-row svg{width:18px;height:18px}

/* pick rows (add vendor) */
.pickrow{display:flex;align-items:center;gap:11px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:11px 13px;margin-bottom:8px}
.pickrow .nm{flex:1;font-weight:800;font-size:15px}
.pickrow .nm small{display:block;color:var(--ink-soft);font-weight:600;font-size:12.5px;margin-top:1px}
.pickrow .go{width:38px;height:38px;border:none;background:var(--red);color:#fff;border-radius:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none}
.pickrow .go svg{width:19px;height:19px}

/* ---------- vendor hub ---------- */
.vhero{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;margin:4px 0 16px;box-shadow:0 4px 14px rgba(140,20,20,.07)}
.vtop{display:flex;align-items:center;gap:12px}
.dot.big{width:18px;height:18px;border-radius:6px}
.vname{font-family:"Anton";font-weight:400;font-size:23px;line-height:1.05;letter-spacing:.3px;text-transform:uppercase}
.vsub{color:var(--ink-soft);font-weight:600;font-size:13.5px;margin-top:3px}
.vchips{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}
.qarow{display:flex;gap:8px;margin-top:14px}
.qa{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;text-decoration:none;background:var(--oat);color:var(--ink);border:none;border-radius:13px;padding:11px 4px;font-weight:800;font-size:11.5px;cursor:pointer}
.qa svg{width:20px;height:20px;color:var(--red)}
.hubsec{margin:0 0 16px}
.hubt{display:flex;align-items:center;gap:8px;font-family:"Oswald";font-weight:600;font-size:12.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);margin:0 2px 8px}
.hubt .cnt{background:var(--oat);color:var(--ink-soft);border-radius:999px;padding:1px 9px;font-size:12px}
.addlink{margin-left:auto;border:none;background:none;color:var(--red);font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;text-transform:none;letter-spacing:0}
.kv{display:flex;justify-content:space-between;gap:14px;padding:9px 0;border-bottom:1px solid var(--line)}
.kv:last-child{border-bottom:none}
.kv>span{color:var(--ink-soft);font-weight:600;font-size:13.5px;flex:none}
.kv b,.kv a{font-weight:700;font-size:14px;text-align:right;word-break:break-word}
.kv a{color:var(--red-deep);text-decoration:none}
.muted{color:var(--ink-soft);font-weight:600;font-size:13.5px;padding:3px 0}
.docrow,.histrow,.payrow{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)}
.docrow:last-child,.histrow:last-child,.payrow:last-child{border-bottom:none}
.di{color:var(--red);flex:none}.di svg{width:21px;height:21px}
.dm,.hm,.pm{flex:1;min-width:0}
.dm b,.hm b,.pm b{display:block;font-weight:800;font-size:15px;line-height:1.2}
.dm small,.hm small,.pm small{color:var(--ink-soft);font-weight:600;font-size:12.5px;display:block;margin-top:1px}
.mini{border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:7px 11px;font-weight:800;font-size:12px;cursor:pointer;flex:none;color:var(--red-deep)}
.ci{width:27px;height:27px;border-radius:8px;border:2px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;flex:none;cursor:pointer;color:#fff;padding:0}
.ci.on{background:var(--ok);border-color:var(--ok)}
.ci svg{width:15px;height:15px}
.paytotals{display:flex;gap:10px;margin-bottom:7px}
.paytotals>div{flex:1;background:var(--oat);border-radius:11px;padding:9px 11px}
.paytotals span{display:block;font-family:"Oswald";text-transform:uppercase;letter-spacing:.06em;font-size:10.5px;color:var(--ink-soft);font-weight:600}
.paytotals b{font-family:"Anton";font-weight:400;font-size:19px;color:var(--ink)}
.linkbox{background:#fff;border:1.5px dashed var(--red);border-radius:11px;padding:11px 13px;font-weight:700;font-size:13.5px;color:var(--red-deep);word-break:break-all;cursor:pointer}

/* todo */
.row.todo .check{width:28px;height:28px;border-radius:9px;border:2px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;flex:none;cursor:pointer;color:#fff;padding:0}
.row.todo .check.on{background:var(--ok);border-color:var(--ok)}
.row.todo .check svg{width:16px;height:16px}
.row.todo .main b.done{text-decoration:line-through;color:var(--ink-soft)}

/* empty */
.empty{text-align:center;padding:46px 20px;color:var(--ink-soft)}
.empty .ic{width:46px;height:46px;margin:0 auto 12px;color:var(--line)}
.empty .ic svg{width:46px;height:46px}
.empty b{display:block;font-family:"Anton";font-weight:400;font-size:20px;color:var(--ink);text-transform:uppercase;letter-spacing:.3px}
.empty p{margin:7px 0 0;font-weight:600;font-size:14px}

/* ---------- sheets ---------- */
.scrim{position:fixed;inset:0;background:rgba(30,15,5,.42);display:flex;align-items:flex-end;justify-content:center;z-index:50;animation:fade .15s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{width:100%;max-width:500px;background:var(--cream);border-radius:22px 22px 0 0;padding:8px 18px calc(20px + env(safe-area-inset-bottom));max-height:90vh;overflow-y:auto;animation:up .22s cubic-bezier(.2,.8,.2,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.grip{width:40px;height:5px;border-radius:3px;background:var(--line);margin:6px auto 12px}
.sheet h3{font-family:"Anton";font-weight:400;font-size:23px;text-transform:uppercase;letter-spacing:.3px;margin:2px 0 4px}
.lead{color:var(--ink-soft);font-weight:600;font-size:14px;margin-bottom:14px}
.fld{margin-bottom:13px}
.fld label{display:block;font-family:"Oswald";text-transform:uppercase;letter-spacing:.06em;font-size:11.5px;font-weight:600;color:var(--ink-soft);margin-bottom:6px}
.fld input,.fld textarea,.fld select{width:100%;border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:12px 14px;font:inherit;font-weight:600;color:var(--ink)}
.fld textarea{min-height:74px;resize:vertical}
.fld input:focus,.fld textarea:focus,.fld select:focus{outline:none;border-color:var(--red)}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:8px 13px;font-weight:700;font-size:13px;cursor:pointer;color:var(--ink)}
.chip .d{width:10px;height:10px;border-radius:3px}
.chip.on{border-color:var(--red);background:#fff5f5;color:var(--red-deep)}
.acts{display:flex;flex-direction:column;gap:9px;margin-top:16px}

/* ---------- fab + tabs ---------- */
.fab{position:absolute;right:18px;bottom:24px;z-index:20}
.fab .inner button{width:58px;height:58px;border-radius:50%;border:none;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 22px rgba(140,20,20,.34)}
.fab .inner button svg{width:26px;height:26px}
.tabs{background:#fff;border-bottom:3px solid var(--red);padding:4px 8px 6px}
.tabs .inner{display:flex;max-width:500px;margin:0 auto}
.tabs button{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;color:var(--ink-soft);cursor:pointer;font-family:"Oswald";font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em}
.tabs button.on{color:var(--red)}
.tabs .ico{position:relative}
.tabs .ico svg{width:23px;height:23px}
.tbadge{position:absolute;top:-5px;right:-9px;min-width:16px;height:16px;line-height:15px;padding:0 4px;border-radius:9px;background:var(--red);color:#fff;font-size:10px;font-weight:800;text-align:center;font-family:-apple-system,sans-serif;border:1.5px solid #fff}

/* ---------- gate ---------- */
.gate{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 26px;text-align:center;background:radial-gradient(120% 80% at 50% 0%, #fff 0%, var(--cream) 60%)}
.gate .logo{width:230px;max-width:74%;margin-bottom:6px}
.gate h1{font-family:"Anton";font-weight:400;font-size:30px;text-transform:uppercase;letter-spacing:.5px;margin:6px 0 2px}
.gate p{color:var(--ink-soft);font-weight:600;font-size:13.5px;margin:0 0 22px}
.gate .box{width:100%;max-width:300px}
.gate input{width:100%;border:1.5px solid var(--line);background:#fff;border-radius:13px;padding:14px 16px;font:inherit;font-weight:700;font-size:16px;text-align:center;letter-spacing:.04em}
.gate input:focus{outline:none;border-color:var(--red)}
.gate .err{color:var(--bad);font-weight:700;font-size:13px;min-height:18px;margin:10px 0 12px}
.gate .btn{margin-top:2px}
.spin{width:34px;height:34px;border:3.5px solid var(--line);border-top-color:var(--red);border-radius:50%;margin:18px auto;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* toast + sync */
#toast{position:fixed;left:50%;bottom:120px;transform:translateX(-50%) translateY(20px);background:var(--black);color:#fff;font-weight:700;font-size:14px;padding:11px 18px;border-radius:12px;opacity:0;pointer-events:none;transition:.25s;z-index:80;max-width:88%;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.syncpill{position:fixed;top:10px;left:50%;transform:translateX(-50%) translateY(-14px);background:var(--ink);color:#fff;font-weight:700;font-size:12px;padding:6px 13px;border-radius:999px;opacity:0;transition:.2s;z-index:80}
.syncpill.show{opacity:.95;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap"><div id="app"></div></div>
<div id="toast"></div>
<div id="sync" class="syncpill"></div>
<script>
/* =====================================================================
   MARKET DAY  —  Long Island Farmers Markets admin
   Shared data on Netlify. Admin app is passcode-gated; the public
   vendor application form (apply.html) is open to everyone.
   ===================================================================== */
const API='/api/data';
const PASS_KEY='md-pass';
const PASSCODE='market26';            // admin passcode (also enforced server-side)
let PASS=null;

const I={
  cal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>',
  people:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 3 5 9l-2-2M21 6 11 16l-3-3M21 12v7a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8"/></svg>',

    if(!r.ok) return {ok:false};

}

let lastSig='';
let saving=false, saveAgain=false, dirty=false, retryT=null;
async function save(){
  if(!PASS) return;
  dirty=true;                                   // local change not yet confirmed on server
  if(saving){ saveAgain=true; return; }
  saving=true; showSync('Saving...');
  let okFlag=false;
  try{
    const r=await fetch(API,{method:'POST',headers:{'x-passcode':PASS,'content-type':'application/json'},body:JSON.stringify({state:S,inbox:INBOX})});
    okFlag=r.ok; showSync(r.ok?'Saved':'Could not save - retrying');
  }catch(e){ showSync('Offline - retrying'); }
  saving=false;
  if(okFlag){ dirty=false; lastSig=stateSig(S,INBOX); }   // server now matches local; poll won't re-render
  if(saveAgain){ saveAgain=false; return save(); }
  if(!okFlag){ clearTimeout(retryT); retryT=setTimeout(save,4000); }  // keep trying so edits are never lost
}

  if(/plant|garden|flower|bouquet|nursery|succulent/.test(t))return 'plants';
  if(/wellness|health|healing|supplement|herbal|apothecary|cbd/.test(t))return 'wellness';
  if(/beauty|skin|soap|cosmetic|makeup|lotion|balm|candle/.test(t))return 'beauty';
  if(/produce|farm|veg|fruit|microgreen|orchard|organic/.test(t))return 'farm';
  if(/prepared|empanada|hummus|dumpling|kitchen|ravioli|soup|meal|hot food/.test(t))return 'prepared';
  if(/craft|art|print|jewel|apron|handmade|ceramic|woodwork|thread/.test(t))return 'handcrafted';
  if(/jam|honey|pickle|sauce|\bnut|snack|pantry|spice|season|salsa|\boil\b|specialty|chip/.test(t))return 'pantry';
  return null;
}

document.addEventListener('input',e=>{
  if(e.target&&e.target.id==='vq'){ ui.q=e.target.value; const pos=e.target.selectionStart; render(); const n=document.getElementById('vq'); if(n){ n.focus(); try{n.setSelectionRange(pos,pos);}catch(_){}} }

document.addEventListener('click',async e=>{
  const el=e.target.closest('[data-a]'); if(!el) return;
  const a=el.dataset.a;
  if(a==='tab'){ ui.view=el.dataset.v; ui.sheet=null; render(); sc(); return; }
  if(a==='export-data'){ exportData(); return; }
  if(a==='import-data'){ importData(); return; }
  if(a==='vmkt'){ ui.vmkt=el.dataset.m; render(); return; }
  if(a==='back'){ ui.view=ui.view==='addv'?'day':(ui.view==='vdetail'?'vendors':'days'); ui.sheet=null; render(); sc(); return; }
  if(a==='open-day'){ ui.view='day'; ui.m=el.dataset.m; ui.date=el.dataset.date; render(); sc(); return; }
  if(a==='goto-add'){ ui.view='addv'; render(); sc(); return; }
  if(a==='pick-vendor'){ await tryAdd(el.dataset.id,false); return; }
  if(a==='force-add'){ await tryAdd(el.dataset.id,true); return; }
  if(a==='toggle-paid'){ const b=S.bookings.find(x=>x.id===el.dataset.id); if(b){b.paid=!b.paid; render(); save(); toast(b.paid?'Marked paid':'Marked as owes');} return; }
  if(a==='remove-booking'){ const b=S.bookings.find(x=>x.id===el.dataset.id); const v=b?vendor(b.v):null; confirmRemove(el.dataset.id,v?v.name:'this vendor'); return; }
  if(a==='do-remove'){ S.bookings=S.bookings.filter(x=>x.id!==el.dataset.id); ui.sheet=null; render(); save(); toast('Removed'); return; }
  if(a==='open-vendor'){ ui.view='vdetail'; ui.vid=el.dataset.id; ui.sheet=null; render(); sc(); return; }
  if(a==='add-vendor'){ openVendor(null); return; }
  if(a==='edit-vendor'){ openVendor(vendor(el.dataset.id)); return; }
  if(a==='pickcat'){ ui.catPick=el.dataset.c; document.querySelectorAll('#catchips .chip').forEach(ch=>ch.classList.toggle('on',ch.dataset.c===el.dataset.c)); return; }
  if(a==='pickstatus'){ ui.statusPick=el.dataset.s; document.querySelectorAll('#statuschips .chip').forEach(ch=>ch.classList.toggle('on',ch.dataset.s===el.dataset.s)); return; }
  if(a==='pickins'){ ui.insPick=el.dataset.i; document.querySelectorAll('#inschips .chip').forEach(ch=>ch.classList.toggle('on',ch.dataset.i===el.dataset.i)); return; }
  if(a==='pickdoc'){ ui.docType=el.dataset.t; document.querySelectorAll('#docchips .chip').forEach(ch=>ch.classList.toggle('on',ch.dataset.t===el.dataset.t)); return; }
  if(a==='pickpay'){ ui.payMethod=el.dataset.m; document.querySelectorAll('#paychips .chip').forEach(ch=>ch.classList.toggle('on',ch.dataset.m===el.dataset.m)); return; }
  if(a==='save-vendor'){ await saveVendor(); return; }
  if(a==='del-vendor'){ const id=el.dataset.id; S.vendors=S.vendors.filter(x=>x.id!==id); S.bookings=S.bookings.filter(b=>b.v!==id); ui.sheet=null; ui.view='vendors'; render(); save(); toast('Vendor deleted'); return; }
  if(a==='add-doc'){ openDoc(el.dataset.id); return; }
  if(a==='save-doc'){ await saveDoc(el.dataset.id); return; }
  if(a==='del-doc'){ const v=vendor(el.dataset.id); if(v){v.docs=(v.docs||[]).filter(d=>d.id!==el.dataset.d); render(); save(); toast('Removed');} return; }
  if(a==='open-doc-file'){ openDocFile(el.dataset.id,el.dataset.d); return; }
  if(a==='add-payment'){ openPayment(el.dataset.id); return; }
  if(a==='save-payment'){ await savePayment(el.dataset.id); return; }
  if(a==='del-payment'){ const v=vendor(el.dataset.id); if(v){v.payments=(v.payments||[]).filter(p=>p.id!==el.dataset.p); render(); save(); toast('Removed');} return; }
  if(a==='toggle-checkin'){ const b=S.bookings.find(x=>x.id===el.dataset.id); if(b){b.checkedIn=!b.checkedIn; if(b.checkedIn)b.checkedInAt=new Date().toISOString(); render(); save();} return; }
  if(a==='open-app'){ const ap=INBOX.find(x=>x.id===el.dataset.id); if(ap&&!ap.seen){ ap.seen=true; save(); } openApp(ap); return; }
  if(a==='open-vendor'){ ui.sheet=null; ui.view='vdetail'; ui.vid=el.dataset.id; render(); return; }
  if(a==='import-app'){ importApp(el.dataset.id); return; }
  if(a==='dismiss-app'){ dismissApp(el.dataset.id); return; }
  if(a==='copy-link'){ const u=applyURL(); if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(u).then(()=>toast('Link copied')).catch(()=>toast(u)); } else { toast(u); } return; }
  if(a==='add-todo'){ openTodo(null); return; }
  if(a==='edit-todo'){ openTodo(S.todos.find(t=>t.id===el.dataset.id)); return; }
  if(a==='toggle-todo'){ const t=S.todos.find(x=>x.id===el.dataset.id); if(t){t.done=!t.done; render(); save();} return; }
  if(a==='save-todo'){ await saveTodo(); return; }
  if(a==='edit-music'){ openMusic(); return; }
  if(a==='save-music'){ await saveMusic(); return; }
  if(a==='clear-music'){ const mkey=ui.m+'|'+ui.date; if(S.music) delete S.music[mkey]; ui.sheet=null; render(); save(); toast('Removed'); return; }
  if(a==='del-todo'){ S.todos=S.todos.filter(x=>x.id!==el.dataset.id); ui.sheet=null; render(); save(); toast('Deleted'); return; }
  if(a==='closesheet'){ ui.sheet=null; render(); return; }
  if(a==='scrim'){ if(!e.target.closest('.sheet')){ ui.sheet=null; render(); } return; }
  if(a==='do-login'){ doLogin(); return; }
});
function gf(name){const f=document.querySelector(`[name="${name}"]`);return f?f.value.trim():'';}
async function tryAdd(vendorId,force){
  const v=vendor(vendorId); if(!v) return;
  if(spotsLeft(ui.m,ui.date)<=0){ toast('This day is full'); return; }
  const c=cat(v.cat),n=catCount(ui.m,ui.date,v.cat);
  if(n>=(CAP[v.cat]||99)&&!force){ confirmCat(vendorId,c.name,n); return; }
  S.bookings.push({id:bid(),m:ui.m,date:ui.date,v:vendorId,paid:false});
  ui.sheet=null; ui.view='day'; render(); sc(); save(); toast(v.name+' added');
}
async function saveVendor(){
  const name=gf('name'); if(!name){ toast('Please add a name'); return; }
  const data={
    name, cat:normCat(ui.catPick||'farm'), contact:gf('contact'),
    phone:gf('phone'), email:gf('email'), website:gf('website'),
    products:gf('products'), frequency:gf('frequency'), address:gf('address'),
    status:ui.statusPick||'booked', insStatus:ui.insPick||'', insExpiry:gf('insExpiry'),
    fee:gf('fee'), notes:gf('notes')
  };
  if(ui.sheet.id){ Object.assign(vendor(ui.sheet.id),data); toast('Saved'); }
  else { S.vendors.push({id:uid('v'),docs:[],payments:[],...data}); toast(name+' added'); }
  ui.sheet=null; render(); save();
}
async function saveDoc(vid){
  const v=vendor(vid); if(!v) return;
  const inp=document.getElementById('docfile');
  const f=inp&&inp.files&&inp.files[0];
  if(!f){ toast('Choose a file first'); return; }
  if(f.size>5*1024*1024){ toast('File too large (max 5MB)'); return; }
  const type=ui.docType||'Document', label=gf('docname'), exp=gf('docexp');
  toast('Uploading...');
  try{
    const dataB64=await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>{ const s=String(r.result||''); res(s.slice(s.indexOf(',')+1)); }; r.onerror=()=>rej(new Error('read')); r.readAsDataURL(f); });
    const resp=await fetch('/api/upload',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({pass:PASS,name:f.name,type:f.type||'application/octet-stream',dataB64})});
    const j=await resp.json().catch(()=>null);
    if(!j||!j.ok||!j.key){ toast((j&&j.error==='too-big')?'File too large':'Upload failed'); return; }
    if(!Array.isArray(v.docs)) v.docs=[];
    v.docs.push({id:uid('d'),type,name:label||f.name,key:j.key,size:f.size,kind:'file',expiry:exp,addedAt:iso(new Date())});
    if(type==='Insurance (COI)'&&!v.insStatus) v.insStatus='on';
    ui.sheet=null; render(); save(); toast('File attached');
  }catch(e){ toast('Upload failed - check connection'); }
}
function openDocFile(vid,did){
  const v=vendor(vid); if(!v) return; const d=(v.docs||[]).find(x=>x.id===did); if(!d){ toast('Not found'); return; }
  if(d.key){ window.open('/api/file?key='+encodeURIComponent(d.key)+'&pass='+encodeURIComponent(PASS||''),'_blank','noopener'); return; }
  if(d.url){ window.open(d.url,'_blank','noopener'); return; }
  toast('No file attached');
}
async function savePayment(vid){
  const v=vendor(vid); if(!v) return;
  const amt=parseFloat(gf('payamt')); if(!(amt>0)){ toast('Enter an amount'); return; }
  const p={id:uid('p'),amount:amt,date:gf('paydate')||iso(new Date()),method:ui.payMethod||'',note:gf('paynote')};
  if(!Array.isArray(v.payments)) v.payments=[];
  v.payments.push(p);
  ui.sheet=null; render(); save(); toast('Payment recorded');
}
function marketsFromApp(a){
  const s=((a&&a.markets)||'').toLowerCase(); const out=[];
  if(/huntington/.test(s)) out.push('hunt');
  if(/babylon/.test(s)) out.push('baby');
  if(/station|ronkonkoma/.test(s)) out.push('ronk');
  return out;
}
function vendorFromApp(a){
  const catId=guessCat(a.category)||guessCat(a.products)||'handcrafted';
  const v={id:uid('v'),name:a.name,cat:catId,contact:a.contact||'',phone:a.phone||'',email:a.email||'',website:a.website||'',products:a.products||'',frequency:a.frequency||'',address:a.address||'',markets:marketsFromApp(a),status:'applied',insStatus:a.insuranceLink?'on':'',insExpiry:'',fee:'',notes:(a.message||'')+(a.markets?('\nMarkets requested: '+a.markets):'')+(a.submittedAt?('\nApplied via form '+a.submittedAt.slice(0,10)):''),docs:[],payments:[]};
  if(a.insuranceLink) v.docs.push({id:uid('d'),type:'Insurance (COI)',name:'COI (from application)',url:fixUrl(a.insuranceLink),addedAt:iso(new Date())});
  (a.docLinks||[]).forEach((d,i)=>{ if(d) v.docs.push({id:uid('d'),type:'Other',name:'Doc '+(i+1)+' (from application)',url:fixUrl(d),addedAt:iso(new Date())}); });
  return v;
}
function mergeAppIntoVendor(v,a){
  if(!v.phone&&a.phone) v.phone=a.phone;
  if(!v.email&&a.email) v.email=a.email;
  if(!v.website&&a.website) v.website=a.website;
  if(!v.address&&a.address) v.address=a.address;
  if(!v.products&&a.products) v.products=a.products;
  if(!v.frequency&&a.frequency) v.frequency=a.frequency;
  if(!v.contact&&a.contact) v.contact=a.contact;
  const mk=marketsFromApp(a); if(mk.length){ const cur=Array.isArray(v.markets)?v.markets:[]; mk.forEach(m=>{ if(!cur.includes(m)) cur.push(m); }); v.markets=cur; }
  v.docs=v.docs||[];
  if(a.insuranceLink){ const u=fixUrl(a.insuranceLink); if(!v.docs.some(d=>d.url===u)){ v.docs.push({id:uid('d'),type:'Insurance (COI)',name:'COI (from application)',url:u,addedAt:iso(new Date())}); if(!v.insStatus) v.insStatus='on'; } }
}
function findVendorForApp(a){
  const email=(a.email||'').trim().toLowerCase(), name=(a.name||'').trim().toLowerCase();
  let v=null;
  if(email) v=S.vendors.find(x=>(x.email||'').trim().toLowerCase()===email);
  if(!v&&name) v=S.vendors.find(x=>(x.name||'').trim().toLowerCase()===name);
  return v||null;
}
function importApp(id){
  const a=INBOX.find(x=>x.id===id); if(!a) return;
  let v=findVendorForApp(a);
  if(v){ mergeAppIntoVendor(v,a); } else { v=vendorFromApp(a); S.vendors.push(v); }
  a.status='imported'; a.importedVendorId=v.id; a.seen=true;
  ui.sheet=null; ui.view='vdetail'; ui.vid=v.id; render(); sc(); save(); toast(a.name+' added to Vendors');
}
function autoImport(){
  if(!Array.isArray(INBOX)||!S||!Array.isArray(S.vendors)) return 0;
  let n=0;
  INBOX.forEach(a=>{
    if(!a||a.importedVendorId||a.status==='dismissed') return;
    let v=findVendorForApp(a);
    if(v){ mergeAppIntoVendor(v,a); } else { v=vendorFromApp(a); S.vendors.push(v); }
    a.importedVendorId=v.id; a.status='imported'; n++;
  });
  return n;
}
function dismissApp(id){ const a=INBOX.find(x=>x.id===id); if(!a) return; a.status=(a.status==='dismissed')?'new':'dismissed'; ui.sheet=null; render(); save(); toast(a.status==='dismissed'?'Dismissed':'Restored'); }

let stt2; function showSync(m){const s=document.getElementById('sync');s.textContent=m;s.classList.add('show');clearTimeout(stt2);stt2=setTimeout(()=>s.classList.remove('show'),1400);}
function sc(){const s=document.querySelector('.scroll');if(s)s.scrollTop=0;}
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&ui.sheet){ui.sheet=null;render();}});
async function pull(){
  if(!PASS||saving||dirty||ui.sheet) return;       // skip while saving, while local edits are unsaved, or an editor is open
  const ae=document.activeElement;
  if(ae && (ae.tagName==='INPUT'||ae.tagName==='TEXTAREA')) return;  // don't interrupt typing
  const res=await apiGet(PASS);
  if(!res.ok||!res.state) return;
  const sig=stateSig(res.state,res.inbox);
  if(sig===lastSig) return;                         // nothing changed on the server - skip re-render
  lastSig=sig;
  S=res.state; INBOX=res.inbox||[]; migrateCats(S);
  const added=autoImport();
  if(added>0) save();
  render();
  if(added>0) toast(added+' new application'+(added>1?'s':'')+' added to Vendors');
}
window.addEventListener('focus',pull);
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible') pull(); });
setInterval(()=>{ if(document.visibilityState==='visible') pull(); }, 5000);  // live: pull fresh data every 5s

/* =====================================================================
   LOGIN GATE  (admin only)
   ===================================================================== */
function gateScreen(msg,busy){
  app.innerHTML=`<div class="gate">
    <img class="logo" src="logo.png" alt="G&amp;G Long Island Farmers Market"/>
    <h1>Market Day</h1>
    <p>Vendor &amp; market manager</p>
    <div class="box">
      ${busy?'<div class="spin"></div>':`
        <input id="pass" type="password" inputmode="text" autocomplete="off" placeholder="Enter passcode" />
        <div class="err">${msg||''}</div>
        <button class="btn" data-a="do-login">Open</button>`}
    </div>
  </div>`;
  if(!busy){ const i=document.getElementById('pass'); if(i){ i.focus(); i.addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); }); } }
}
async function enter(passVal,res){
  PASS=passVal; try{ localStorage.setItem(PASS_KEY,passVal); }catch(e){}
  const online = !!(res && res.ok);
  S = (online && res.state) ? res.state : freshState();
  INBOX = (online && res.inbox) ? res.inbox : [];
  ['markets','vendors','bookings','todos'].forEach(k=>{ if(!Array.isArray(S[k])) S[k]=freshState()[k]; });
  S.seasonEnd=S.seasonEnd||'2026-11-01';
  if(!S.music||typeof S.music!=='object') S.music={};
  const before=JSON.stringify(S); S=applySeed(S); S=applyImports(S); S=migrateCats(S);
  const added=autoImport();
  ui.view='days'; render();                       // you are IN — never blocked by the network
  if(online && (added>0 || !res.state || JSON.stringify(S)!==before)){ await save(); }
  lastSig=stateSig(S,INBOX);
  if(!online){ toast('Loaded local copy — will sync when connected'); }
  else if(added>0){ toast(added+' new application'+(added>1?'s':'')+' added to Vendors'); }
}
async function doLogin(){
  const i=document.getElementById('pass'); const val=i?i.value.trim():'';
  if(val!==PASSCODE){ gateScreen('That passcode did not work. Try again.'); return; }
  gateScreen('',true);
  const res=await apiGet(val);                     // gate already passed; this only loads data
  await enter(val,res);
}

/* ---- boot ---- */
(async function(){
  let saved=''; try{ saved=localStorage.getItem(PASS_KEY)||''; }catch(e){}
  if(saved===PASSCODE){ gateScreen('',true); const res=await apiGet(saved); await enter(saved,res); return; }
  gateScreen('');
})();
</script>
